<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Gourmet Delight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 flex items-center justify-center min-h-screen">
    <div class="text-center p-8">
        <div class="w-24 h-24 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-8">
            <svg class="w-12 h-12 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
        </div>
        <h1 class="text-6xl font-bold text-slate-300 mb-4">404</h1>
        <h2 class="text-2xl font-bold mb-4">Page Not Found</h2>
        <p class="text-slate-500 mb-8 max-w-md mx-auto">The page you're looking for doesn't exist or has been moved.</p>
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/" class="bg-orange-600 hover:bg-orange-700 text-white px-10 py-4 rounded-full font-bold transition-all shadow-lg inline-block">Go Home</a>
            <a href="/menu/" class="bg-white hover:bg-slate-50 text-slate-900 border border-slate-200 px-10 py-4 rounded-full font-bold transition-all shadow-lg inline-block">Browse Menu</a>
        </div>
    </div>
</body>
</html>
